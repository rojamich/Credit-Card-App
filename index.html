<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Wallet</title>
    <link rel="stylesheet" href="./styles/mainStyle.css?v=2026-03-04">
    <link rel="stylesheet" href="./styles/walletStyle.css?v=2026-03-04">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0b57d0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CardOpt">
    <link rel="apple-touch-icon" href="./logo/wallet.png">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="./index.html">
                <img src="./logo/wallet.png" class="brand-logo" alt="Card Optimizer">
                <span>Card Optimizer</span>
            </a>
            <nav class="topnav" aria-label="Primary">
                <a class="nav-tab is-active" href="./index.html" aria-current="page">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v2H3V7zm0 4h18v6a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-6zm3 2v2h4v-2H6z"/></svg>
                    <span>Wallet</span>
                </a>
                <a class="nav-tab" href="./banks.html">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2 8v2h20V8L12 3zm-7 9h2v6H5v-6zm4 0h2v6H9v-6zm4 0h2v6h-2v-6zm4 0h2v6h-2v-6zM2 20h20v2H2z"/></svg>
                    <span>Banks</span>
                </a>
                <a class="nav-tab" href="./cards.html">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 6a3 3 0 0 1 3-3h14a3 3 0 0 1 3 3v2H2V6zm0 4h20v8a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3v-8zm3 3h6v2H5v-2z"/></svg>
                    <span>Cards</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="wallet-page">
        <section class="quick-categories" aria-labelledby="quick-categories-title">
            <div class="quick-categories-head">
                <h2 id="quick-categories-title">Favorite Categories</h2>
                <p>Pinned shortcuts for the selected profile.</p>
            </div>
            <div id="favorite-categories-grid" class="favorite-categories-grid"></div>
            <p id="favorite-categories-empty" class="favorite-categories-empty hidden">Pin categories to show shortcuts here.</p>
            <div class="wallet-controls">
                <div class="wallet-selectors">
                    <label class="wallet-select-wrap" for="wallet-profile-select">
                        <span>Profile</span>
                        <select id="wallet-profile-select">
                            <option value="michael">Michael</option>
                            <option value="jenna">Jenna</option>
                            <option value="both">Both</option>
                        </select>
                    </label>
                    <label class="wallet-select-wrap" for="wallet-filter-select">
                        <span>Filter</span>
                        <select id="wallet-filter-select">
                            <option value="all">All Cards</option>
                            <option value="wallet">Only In Wallet</option>
                            <option value="favorites">Favorites</option>
                            <option value="favorites_wallet">Favorites In Wallet</option>
                        </select>
                    </label>
                </div>
                <label class="wallet-toggle-row">
                    <input id="wallet-no-ftf-toggle" type="checkbox">
                    <span>International mode (No foreign transaction fee)</span>
                </label>
                <p id="wallet-profile-note" class="wallet-status" aria-live="polite"></p>
                <div class="wallet-actions">
                    <button id="refresh-wallet-data-button" type="button" class="wallet-action-button">Refresh data</button>
                    <button id="reset-wallet-data-button" type="button" class="wallet-action-button wallet-action-danger">Reset local data</button>
                </div>
                <p id="wallet-last-sync" class="wallet-status" aria-live="polite"></p>
                <p id="wallet-controls-message" class="wallet-status" aria-live="polite"></p>
            </div>
        </section>
        <div class="bonus-container" id="bonus-container"></div>
    </main>

    <script src="./js/dataStore.js?v=2026-03-04"></script>
    <script src="./js/walletScript.js?v=2026-03-04"></script>
    <script src="./js/registerSw.js?v=2026-03-04"></script>
</body>
</html>
