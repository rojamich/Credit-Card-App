<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Offers</title>
    <link rel="stylesheet" href="./styles/mainStyle.css?v=2026-03-05">
    <link rel="stylesheet" href="./styles/offersStyle.css?v=2026-03-05">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0b57d0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CardOpt">
    <link rel="apple-touch-icon" href="./logo/wallet.png">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="./index.html">
                <img src="./logo/wallet.png" class="brand-logo" alt="Card Optimizer">
                <span>Card Optimizer</span>
            </a>
            <nav class="topnav" aria-label="Primary">
                <a class="nav-tab" href="./index.html">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v2H3V7zm0 4h18v6a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-6zm3 2v2h4v-2H6z"/></svg>
                    <span>Wallet</span>
                </a>
                <a class="nav-tab" href="./banks.html">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2 8v2h20V8L12 3zm-7 9h2v6H5v-6zm4 0h2v6H9v-6zm4 0h2v6h-2v-6zm4 0h2v6h-2v-6zM2 20h20v2H2z"/></svg>
                    <span>Banks</span>
                </a>
                <a class="nav-tab" href="./cards.html">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 6a3 3 0 0 1 3-3h14a3 3 0 0 1 3 3v2H2V6zm0 4h20v8a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3v-8zm3 3h6v2H5v-2z"/></svg>
                    <span>Cards</span>
                </a>
                <a class="nav-tab is-active" href="./offers.html" aria-current="page">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v10H4V7zm2 2v6h12V9H6zm2 1h4v2H8v-2z"/></svg>
                    <span>Offers</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="offers-page">
        <section class="offers-controls">
            <h2>Offers</h2>
            <div class="offers-filters">
                <label>Profile
                    <select id="offers-profile-select">
                        <option value="michael">Michael</option>
                        <option value="jenna">Jenna</option>
                        <option value="both">Both</option>
                    </select>
                </label>
                <label>Search
                    <input id="offers-search-input" type="text" placeholder="Merchant or alias">
                </label>
                <label>Status
                    <select id="offers-status-select">
                        <option value="active">Active</option>
                        <option value="expired">Expired</option>
                        <option value="all">All</option>
                    </select>
                </label>
                <label>Provider
                    <select id="offers-provider-select">
                        <option value="all">All</option>
                        <option value="chase">Chase</option>
                        <option value="amex">Amex</option>
                        <option value="other">Other</option>
                    </select>
                </label>
            </div>
            <div id="offers-category-strip" class="offers-category-strip" aria-label="Offer categories"></div>
            <details class="offers-maintenance">
                <summary>Maintenance</summary>
                <p class="offers-note" id="maintenance-queue-count"></p>
                <label class="maintenance-toggle">
                    <input id="maintenance-keep-unattached" type="checkbox">
                    Keep offers with zero attachments
                </label>
                <div class="maintenance-actions">
                    <button id="download-cleaned-offers" type="button">Download cleaned offers.json</button>
                    <button id="clear-publish-queue" type="button">Clear publish queue</button>
                </div>
                <p class="offers-note">Replace <code>/database/offers.json</code> with the downloaded file, then commit.</p>
                <div id="maintenance-queue-table" class="maintenance-queue-table"></div>
            </div>
            <p id="offers-profile-note" class="offers-note"></p>
            <p class="offers-note">Edit published offers in <code>database/offers.json</code>.</p>
        </section>

        <section id="offers-list" class="offers-list"></section>

        <details class="offers-advanced" id="offers-advanced-section">
            <summary>Advanced</summary>
            <div class="maintenance-actions">
                <button id="offers-add-button" type="button">Add Offer</button>
                <button id="offers-save-button" type="button">Save All Offers</button>
                <button id="offers-export-backup-button" type="button">Export backup</button>
                <button id="offers-export-publish-button" type="button">Export for publish</button>
                <button id="offers-reload-published-button" type="button" class="secondary-button">Reload published offers</button>
            </div>
            <p id="offers-admin-message" class="offers-note"></p>
            <div id="offers-admin-list" class="offers-admin-list"></div>
        </details>
    </main>

    <div id="offer-popup" class="offer-popup hidden" role="dialog" aria-modal="true">
        <div class="offer-popup-panel">
            <div class="offer-popup-head">
                <div class="offer-popup-title-wrap">
                    <img id="offer-popup-logo" class="offer-popup-logo hidden" alt="">
                    <span id="offer-popup-avatar" class="offer-avatar">?</span>
                    <h3 id="offer-popup-title"></h3>
                </div>
                <button id="offer-popup-close" type="button">Close</button>
            </div>
            <p id="offer-popup-meta" class="offers-note"></p>
            <label>Estimated spend
                <input id="offer-popup-spend" type="number" min="0" step="1" value="50">
            </label>
            <div id="offer-popup-results" class="offer-results"></div>
            <details>
                <summary>Used attachments</summary>
                <div id="offer-popup-used" class="offer-results"></div>
            </details>
        </div>
    </div>

    <div id="offers-toast" class="offers-toast hidden" role="status" aria-live="polite"></div>

    <div id="offer-editor-modal" class="offer-popup hidden" role="dialog" aria-modal="true">
        <div class="offer-popup-panel">
            <div class="offer-popup-head">
                <h3 id="offer-editor-title">Add Offer</h3>
                <button id="offer-editor-close" type="button">Close</button>
            </div>
            <div id="offer-editor-errors" class="offers-note"></div>
            <form id="offer-editor-form" class="offer-editor-form">
                <label>ID
                    <input id="offer-id-input" type="text" required>
                </label>
                <label>Merchant Key
                    <input id="offer-merchant-key-input" type="text" required>
                </label>
                <label>Merchant Name
                    <input id="offer-merchant-name-input" type="text" required>
                </label>
                <label>Logo URL
                    <input id="offer-logo-input" type="url" placeholder="https://...">
                </label>
                <label>Provider
                    <select id="offer-provider-input">
                        <option value="chase">Chase</option>
                        <option value="amex">Amex</option>
                        <option value="other">Other</option>
                    </select>
                </label>
                <div class="offer-editor-grid">
                    <label>Start Date
                        <input id="offer-start-date-input" type="date">
                    </label>
                    <label>Expires
                        <input id="offer-expires-input" type="date" required>
                    </label>
                </div>

                <fieldset class="offer-editor-fieldset">
                    <legend>Categories</legend>
                    <div id="offer-categories-input" class="offer-category-options"></div>
                </fieldset>

                <label>Offer Type
                    <select id="offer-type-input">
                        <option value="percent">Percent</option>
                        <option value="fixed">Fixed</option>
                        <option value="points">Points</option>
                    </select>
                </label>

                <div id="offer-fields-percent" class="offer-type-fields">
                    <label>Rate (e.g. 0.1 for 10%)
                        <input id="offer-rate-input" type="number" step="0.01" min="0">
                    </label>
                    <label>Max Discount (optional)
                        <input id="offer-max-discount-input" type="number" step="0.01" min="0">
                    </label>
                    <label>Min Spend
                        <input id="offer-min-spend-percent-input" type="number" step="0.01" min="0" value="0">
                    </label>
                </div>

                <div id="offer-fields-fixed" class="offer-type-fields hidden">
                    <label>Fixed Amount
                        <input id="offer-fixed-amount-input" type="number" step="0.01" min="0">
                    </label>
                    <label>Min Spend
                        <input id="offer-min-spend-fixed-input" type="number" step="0.01" min="0" value="0">
                    </label>
                </div>

                <div id="offer-fields-points" class="offer-type-fields hidden">
                    <label>Points
                        <input id="offer-points-input" type="number" step="1" min="0">
                    </label>
                    <label>Program Key
                        <select id="offer-program-key-input"></select>
                    </label>
                    <label>Min Spend
                        <input id="offer-min-spend-points-input" type="number" step="0.01" min="0" value="0">
                    </label>
                </div>

                <label>Aliases (comma separated)
                    <input id="offer-aliases-input" type="text">
                </label>
                <label>Notes
                    <textarea id="offer-notes-input" rows="2"></textarea>
                </label>

                <fieldset class="offer-editor-fieldset">
                    <legend>Attachments</legend>
                    <div id="offer-attachments-input" class="offer-attachments-input"></div>
                    <button id="offer-add-attachment-button" type="button" class="secondary-button">Add Attachment</button>
                </fieldset>

                <div class="maintenance-actions">
                    <button type="submit">Save Offer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./js/dataStore.js?v=2026-03-05"></script>
    <script src="./js/offersScript.js?v=2026-03-05"></script>
    <script src="./js/registerSw.js?v=2026-03-05"></script>
</body>
</html>
